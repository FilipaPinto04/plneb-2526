<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        {% block head %}{% endblock %}
    </head>
    <body class="bg-light">

        <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(90deg, #6a11cb, #2575fc);">
            <div class="container">
                <a class="navbar-brand fw-bold fs-4" href="/"> Dicionário Médico</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto gap-2">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="/">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="/conceitos">Conceitos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="/api/conceitos">Ficheiro</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        {% block body %}{% endblock %}

        <footer class="text-center py-4 mt-5" style="background: linear-gradient(90deg, #6a11cb, #2575fc);">
            <p class="text-white mb-0"> Dicionário Médico</p>
        </footer>

    </body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
